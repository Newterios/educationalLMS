apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: edulms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: edulms/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: edulms-config
            - secretRef:
                name: edulms-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: edulms
spec:
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
---
