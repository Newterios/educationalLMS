apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: edulms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: edulms/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8006
          envFrom:
            - configMapRef:
                name: edulms-config
            - secretRef:
                name: edulms-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
          readinessProbe:
            httpGet:
              path: /health
              port: 8006
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: edulms
spec:
  selector:
    app: notification-service
  ports:
    - port: 8006
      targetPort: 8006
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: edulms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          livenessProbe:
            httpGet:
              path: /health
              port: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
      volumes:
        - name: gateway-config
          configMap:
            name: gateway-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: edulms
spec:
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: edulms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: edulms/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: /api
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: edulms
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000