name: EDULMS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  lint-and-test-go:
    name: Lint & Test Go Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - course-service
          - assessment-service
          - attendance-service
          - media-service
          - analytics-service
          - payment-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Download dependencies
        working-directory: services/${{ matrix.service }}
        run: go mod download
      - name: Build
        working-directory: services/${{ matrix.service }}
        run: go vet ./...
      - name: Test
        working-directory: services/${{ matrix.service }}
        run: go test ./... -v

  lint-and-test-node:
    name: Lint & Test Node Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: services/notification-service
        run: npm ci
      - name: Build check
        working-directory: services/notification-service
        run: node -e "require('./src/index.js')" || true

  lint-and-test-python:
    name: Lint & Test Python Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: services/ai-service
        run: pip install -r requirements.txt
      - name: Syntax check
        working-directory: services/ai-service
        run: python -m py_compile app/main.py

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Build
        working-directory: web
        run: npm run build

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-test-go, lint-and-test-node, lint-and-test-python, build-frontend]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - course-service
          - assessment-service
          - attendance-service
          - notification-service
          - media-service
          - analytics-service
          - ai-service
          - payment-service
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
