

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: edulms
      POSTGRES_PASSWORD: edulms_secret
      POSTGRES_DB: edulms
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edulms"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: edulms
      MONGO_INITDB_ROOT_PASSWORD: edulms_secret
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass edulms_redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "edulms_redis", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: edulms_minio
      MINIO_ROOT_PASSWORD: edulms_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    environment:
      - PORT=8001
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=edulms
      - POSTGRES_PASSWORD=edulms_secret
      - POSTGRES_DB=edulms
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=edulms_redis
      - JWT_SECRET=dev-jwt-secret-key-change-in-production
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=168h
      - SESSION_TIMEOUT=30m
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    environment:
      - PORT=8002
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=edulms
      - POSTGRES_PASSWORD=edulms_secret
      - POSTGRES_DB=edulms
      - AUTH_SERVICE_URL=http://auth-service:8001
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  course-service:
    build:
      context: ./services/course-service
      dockerfile: Dockerfile
    environment:
      - PORT=8003
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=edulms
      - POSTGRES_PASSWORD=edulms_secret
      - POSTGRES_DB=edulms
      - AUTH_SERVICE_URL=http://auth-service:8001
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  assessment-service:
    build:
      context: ./services/assessment-service
      dockerfile: Dockerfile
    environment:
      - PORT=8004
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=edulms
      - POSTGRES_PASSWORD=edulms_secret
      - POSTGRES_DB=edulms
      - MONGO_URI=mongodb://edulms:edulms_secret@mongo:27017/edulms?authSource=admin
      - AUTH_SERVICE_URL=http://auth-service:8001
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped

  attendance-service:
    build:
      context: ./services/attendance-service
      dockerfile: Dockerfile
    environment:
      - PORT=8005
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=edulms
      - POSTGRES_PASSWORD=edulms_secret
      - POSTGRES_DB=edulms
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=edulms_redis
      - AUTH_SERVICE_URL=http://auth-service:8001
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    environment:
      - PORT=8006
      - MONGO_URI=mongodb://edulms:edulms_secret@mongo:27017/edulms?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=edulms_redis
      - KAFKA_BROKERS=kafka:9092
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=noreply@edulms.com
      - SMTP_PASSWORD=changeme
    ports:
      - "8006:8006"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  media-service:
    build:
      context: ./services/media-service
      dockerfile: Dockerfile
    environment:
      - PORT=8007
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=edulms
      - POSTGRES_PASSWORD=edulms_secret
      - POSTGRES_DB=edulms
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=edulms_minio
      - MINIO_SECRET_KEY=edulms_minio_secret
      - MINIO_BUCKET=edulms-files
      - MINIO_USE_SSL=false
      - AUTH_SERVICE_URL=http://auth-service:8001
    ports:
      - "8007:8007"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    environment:
      - PORT=8008
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=edulms
      - POSTGRES_PASSWORD=edulms_secret
      - POSTGRES_DB=edulms
      - MONGO_URI=mongodb://edulms:edulms_secret@mongo:27017/edulms?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=edulms_redis
      - AUTH_SERVICE_URL=http://auth-service:8001
    ports:
      - "8008:8008"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    environment:
      - PORT=8009
    ports:
      - "8009:8009"
    restart: unless-stopped

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    environment:
      - PORT=8010
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=edulms
      - POSTGRES_PASSWORD=edulms_secret
      - POSTGRES_DB=edulms
      - AUTH_SERVICE_URL=http://auth-service:8001
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - user-service
      - course-service
      - assessment-service
      - attendance-service
      - notification-service
      - media-service
      - analytics-service
      - ai-service
      - payment-service
    restart: unless-stopped

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  minio-data:
  zookeeper-data:
  kafka-data:
