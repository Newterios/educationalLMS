

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: edulms
      POSTGRES_PASSWORD: edulms_secret
      POSTGRES_DB: edulms
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edulms"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: edulms
      MONGO_INITDB_ROOT_PASSWORD: edulms_secret
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass edulms_redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "edulms_redis", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: edulms_minio
      MINIO_ROOT_PASSWORD: edulms_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    environment:
      - PORT=8001
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=edulms
      - POSTGRES_PASSWORD=edulms_secret
      - POSTGRES_DB=edulms
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=edulms_redis
      - JWT_SECRET=dev-jwt-secret-key-change-in-production
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=168h
      - SESSION_TIMEOUT=30m
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    environment:
      - PORT=8002
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=edulms
      - POSTGRES_PASSWORD=edulms_secret
      - POSTGRES_DB=edulms
      - AUTH_SERVICE_URL=http://auth-service:8001
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  course-service:
    build:
      context: ./services/course-service
      dockerfile: Dockerfile
    environment:
      - PORT=8003
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=edulms
      - POSTGRES_PASSWORD=edulms_secret
      - POSTGRES_DB=edulms
      - AUTH_SERVICE_URL=http://auth-service:8001
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  assessment-service:
    build:
      context: ./services/assessment-service
      dockerfile: Dockerfile
    environment:
      - PORT=8004
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=edulms
      - POSTGRES_PASSWORD=edulms_secret
      - POSTGRES_DB=edulms
      - MONGO_URI=mongodb://edulms:edulms_secret@mongo:27017/edulms?authSource=admin
      - AUTH_SERVICE_URL=http://auth-service:8001
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped

  attendance-service:
    build:
      context: ./services/attendance-service
      dockerfile: Dockerfile
    environment:
      - PORT=8005
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=edulms
      - POSTGRES_PASSWORD=edulms_secret
      - POSTGRES_DB=edulms
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=edulms_redis
      - AUTH_SERVICE_URL=http://auth-service:8001
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    environment:
      - PORT=8006
      - MONGO_URI=mongodb://edulms:edulms_secret@mongo:27017/edulms?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=edulms_redis
      - KAFKA_BROKERS=kafka:9092
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=noreply@edulms.com
      - SMTP_PASSWORD=changeme
    ports:
      - "8006:8006"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  media-service:
    build:
      context: ./services/media-service
      dockerfile: Dockerfile
    environment:
      - PORT=8007
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=edulms
      - POSTGRES_PASSWORD=edulms_secret
      - POSTGRES_DB=edulms
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=edulms_minio
      - MINIO_SECRET_KEY=edulms_minio_secret
      - MINIO_BUCKET=edulms-files
      - MINIO_USE_SSL=false
      - AUTH_SERVICE_URL=http://auth-service:8001
    ports:
      - "8007:8007"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    environment:
      - PORT=8008
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=edulms
      - POSTGRES_PASSWORD=edulms_secret
      - POSTGRES_DB=edulms
      - MONGO_URI=mongodb://edulms:edulms_secret@mongo:27017/edulms?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=edulms_redis
      - AUTH_SERVICE_URL=http://auth-service:8001
    ports:
      - "8008:8008"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    environment:
      - PORT=8009
    ports:
      - "8009:8009"
    restart: unless-stopped

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    environment:
      - PORT=8010
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=edulms
      - POSTGRES_PASSWORD=edulms_secret
      - POSTGRES_DB=edulms
      - AUTH_SERVICE_URL=http://auth-service:8001
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - user-service
      - course-service
      - assessment-service
      - attendance-service
      - notification-service
      - media-service
      - analytics-service
      - ai-service
      - payment-service
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    volumes:
      - ./observability/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.1
    command:
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    restart: unless-stopped

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    command: --nginx.scrape-uri=http://gateway/nginx_status
    depends_on:
      - gateway
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: postgresql://edulms:edulms_secret@postgres:5432/edulms?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: edulms_redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - node-exporter
      - nginx-exporter
      - postgres-exporter
      - redis-exporter
      - blackbox-exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/edulms-golden-signals.json
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  minio-data:
  zookeeper-data:
  kafka-data:
  prometheus-data:
  grafana-data:
