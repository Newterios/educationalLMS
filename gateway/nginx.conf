worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 100M;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Map to handle CORS preflight
    map $request_method $cors_method {
        OPTIONS 'true';
        default '';
    }

    server {
        listen 80;
        server_name _;

        # Handle CORS preflight globally
        location @cors_preflight {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization';
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        location /api/auth/ {
            limit_req zone=api burst=20 nodelay;
            if ($cors_method = 'true') { return 204; }
            set $auth_upstream http://auth-service:8001;
            proxy_pass $auth_upstream;
            rewrite ^/api/auth/(.*) /$1 break;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/users/ {
            limit_req zone=api burst=20 nodelay;
            if ($cors_method = 'true') { return 204; }
            set $user_upstream http://user-service:8002;
            proxy_pass $user_upstream;
            rewrite ^/api/users/(.*) /$1 break;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/courses/ {
            limit_req zone=api burst=20 nodelay;
            if ($cors_method = 'true') { return 204; }
            set $course_upstream http://course-service:8003;
            proxy_pass $course_upstream;
            rewrite ^/api/courses/(.*) /$1 break;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/assessments/ {
            limit_req zone=api burst=20 nodelay;
            if ($cors_method = 'true') { return 204; }
            set $assessment_upstream http://assessment-service:8004;
            proxy_pass $assessment_upstream;
            rewrite ^/api/assessments/(.*) /$1 break;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/attendance/ {
            limit_req zone=api burst=20 nodelay;
            if ($cors_method = 'true') { return 204; }
            set $attendance_upstream http://attendance-service:8005;
            proxy_pass $attendance_upstream;
            rewrite ^/api/attendance/(.*) /$1 break;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/notifications/ {
            limit_req zone=api burst=20 nodelay;
            if ($cors_method = 'true') { return 204; }
            set $notif_upstream http://notification-service:8006;
            proxy_pass $notif_upstream;
            rewrite ^/api/notifications/(.*) /$1 break;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/notifications/ws {
            set $notif_ws http://notification-service:8006;
            proxy_pass $notif_ws/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        location /api/media/ {
            limit_req zone=api burst=20 nodelay;
            if ($cors_method = 'true') { return 204; }
            set $media_upstream http://media-service:8007;
            proxy_pass $media_upstream;
            rewrite ^/api/media/(.*) /$1 break;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/analytics/ {
            limit_req zone=api burst=20 nodelay;
            if ($cors_method = 'true') { return 204; }
            set $analytics_upstream http://analytics-service:8008;
            proxy_pass $analytics_upstream;
            rewrite ^/api/analytics/(.*) /$1 break;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ai/ {
            limit_req zone=api burst=10 nodelay;
            if ($cors_method = 'true') { return 204; }
            set $ai_upstream http://ai-service:8009;
            proxy_pass $ai_upstream;
            rewrite ^/api/ai/(.*) /$1 break;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120;
        }

        location /api/payments/ {
            limit_req zone=api burst=10 nodelay;
            if ($cors_method = 'true') { return 204; }
            set $payment_upstream http://payment-service:8010;
            proxy_pass $payment_upstream;
            rewrite ^/api/payments/(.*) /$1 break;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Accept, Authorization' always;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Monitoring (superadmin only) ──────────────────────────────────────

        # Internal auth subrequest - validates Bearer token has superadmin role
        location = /_auth_admin {
            internal;
            proxy_pass http://auth-service:8001/validate-admin;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
        }

        location @monitoring_unauthorized {
            default_type application/json;
            return 401 '{"error":"unauthorized","hint":"Provide Authorization: Bearer <superadmin_token>"}';
        }

        location @monitoring_forbidden {
            default_type application/json;
            return 403 '{"error":"forbidden","hint":"superadmin role required"}';
        }

        location /monitoring/grafana/ {
            auth_request /_auth_admin;
            error_page 401 = @monitoring_unauthorized;
            error_page 403 = @monitoring_forbidden;

            set $grafana_upstream http://grafana:3000;
            proxy_pass $grafana_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Required for Grafana sub-path
            proxy_set_header X-Forwarded-Host $host;
            sub_filter_once off;
        }

        location /monitoring/prometheus/ {
            auth_request /_auth_admin;
            error_page 401 = @monitoring_unauthorized;
            error_page 403 = @monitoring_forbidden;

            set $prom_upstream http://prometheus:9090;
            proxy_pass $prom_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = / {
            default_type application/json;
            return 200 '{"service":"EDULMS API Gateway","status":"running","version":"1.0.0"}';
        }

        location /health {
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        location /nginx_status {
            stub_status on;
            access_log off;
            allow 172.0.0.0/8;
            allow 10.0.0.0/8;
            deny all;
        }
    }
}
